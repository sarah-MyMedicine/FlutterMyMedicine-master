services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mymedicine-backend
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:5000:5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
